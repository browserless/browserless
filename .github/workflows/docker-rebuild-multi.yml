name: Rebuild Multi Docker Images (manual)

# Manually rebuild and republish the NON-heavy `multi` and `edge` images under an
# existing tag, on native per-arch runners.
#
# Why this exists: the v2.50.1 semantic-version publish run was cancelled while
# the heavy builds were hung on the Node-24.16 / yauzl deadlock. By cancellation
# time the single-browser images (chrome/chromium/firefox/webkit) and `base` had
# already merged, but `multi` and `edge` had not. The follow-up
# docker-rebuild-heavy.yml republished base + the two heavy images only, so
# `multi:<tag>` and `edge:<tag>` are still missing. Enterprise/cloud images build
# FROM `multi:<tag>` by default, so this gap blocks them.
#
# These images use INSTALL_WEBKIT_VERSIONS=false, so they were never affected by
# the yauzl bug — they just got cut off. They build FROM the already-republished
# base:<tag>, so base is NOT rebuilt here.

# Trigger: pushed changes to THIS file on the build/v2.50.1 branch. Scoping to the
# workflow's own path means it fires on the push that introduces it and does NOT
# re-fire on later, unrelated pushes. To re-run, push a no-op change to this file
# (or re-run from the Actions UI).
on:
  push:
    branches:
      - build/v2.50.1
    paths:
      - .github/workflows/docker-rebuild-multi.yml

env:
  TAG: v2.50.1

jobs:
  # ============================================================
  # Stage 1: build the non-heavy multi and edge images per-arch
  # FROM base:<tag> with INSTALL_WEBKIT_VERSIONS=false, push by digest.
  # edge is linux/amd64 only (Edge is unsupported on arm64).
  # ============================================================
  images-build:
    name: Build ${{ matrix.image }} (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { image: multi, file: multi, platform: linux/amd64, runner: ubuntu-24.04,     pair: linux-amd64, extra: 'INSTALL_WEBKIT_VERSIONS=false' }
          - { image: multi, file: multi, platform: linux/arm64, runner: ubuntu-24.04-arm, pair: linux-arm64, extra: 'INSTALL_WEBKIT_VERSIONS=false' }
          - { image: edge,  file: edge,  platform: linux/amd64, runner: ubuntu-24.04,     pair: linux-amd64, extra: '' }
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_PASSWORD }}

      - name: Build and push ${{ matrix.image }} by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/${{ matrix.file }}/Dockerfile
          platforms: ${{ matrix.platform }}
          build-args: |
            VERSION=${{ env.TAG }}
            ${{ matrix.extra }}
          outputs: type=image,name=ghcr.io/browserless/${{ matrix.image }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p "${RUNNER_TEMP}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${RUNNER_TEMP}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digest-${{ matrix.image }}__${{ matrix.pair }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  # ============================================================
  # Stage 2: merge each image's per-arch digests into its published
  # manifest list. edge is single-arch (one digest).
  # ============================================================
  images-merge:
    name: Merge ${{ matrix.image }} manifest
    runs-on: ubuntu-24.04
    needs: images-build
    strategy:
      fail-fast: false
      matrix:
        image:
          - multi
          - edge
    steps:
      - name: Download ${{ matrix.image }} digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digest-${{ matrix.image }}__*
          merge-multiple: true

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_PASSWORD }}

      - name: Create and push ${{ matrix.image }} manifest list
        working-directory: ${{ runner.temp }}/digests
        env:
          IMAGE: ghcr.io/browserless/${{ matrix.image }}
        run: |
          # shellcheck disable=SC2046  # intentional word-splitting: one arg per digest
          docker buildx imagetools create -t "${IMAGE}:${TAG}" \
            $(printf "${IMAGE}@sha256:%s " *)

      - name: Inspect ${{ matrix.image }} manifest
        env:
          IMAGE: ghcr.io/browserless/${{ matrix.image }}
        run: docker buildx imagetools inspect "${IMAGE}:${TAG}"
