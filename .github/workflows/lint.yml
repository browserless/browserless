name: Lint

on: [workflow_call]

jobs:
  Lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'
          check-latest: true
      - name: Ensure npm >= 11.10.0 (min-release-age support)
        run: npm install -g npm@11.17.0 --ignore-scripts
      - name: Install modules
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 10
          max_attempts: 5
          retry_wait_seconds: 30
          command: npm clean-install
      - name: Run ESLint
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 10
          max_attempts: 5
          retry_wait_seconds: 30
          command: npm run lint
